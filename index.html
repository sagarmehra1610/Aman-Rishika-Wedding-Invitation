<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aman & Rishika</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant:ital,wght@0,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#C8A165;
  --brown:#8C6B3E;
  --dark:#2B2118;
  --cream:#F2E6D8;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Lato',sans-serif;
  background:var(--cream);
  overflow-x:hidden;
}

/* ENVELOPE */
#envelope{
  position:fixed;
  inset:0;
  background:var(--cream);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.env-box{
  width:300px;
  height:200px;
  background:var(--gold);
  position:relative;
  cursor:pointer;
}

.env-flap{
  position:absolute;
  width:100%;
  height:100%;
  background:var(--brown);
  transform-origin:top;
  transition:1s;
}

.env-text{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  color:white;
  letter-spacing:3px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  transition:2s;
}

.hero h1{
  font-family:'Playfair Display';
  font-size:90px;
  color:var(--brown);
}

.hero p{
  letter-spacing:3px;
}

/* PARTICLES */
.p{
  position:fixed;
  width:5px;
  height:5px;
  background:var(--gold);
  border-radius:50%;
  opacity:.4;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* PETALS */
.petal{
  position:fixed;
  width:10px;
  height:14px;
  background:rgba(200,161,101,.4);
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}

/* MUSIC */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px;
  border:1px solid var(--gold);
  background:rgba(200,161,101,.2);
  cursor:pointer;
}

/* FOOTER */
footer{
  padding:40px;
  background:var(--dark);
  color:var(--gold);
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelope" onclick="openInvite()">
  <div class="env-box">
    <div class="env-flap" id="flap"></div>
    <div class="env-text">OPEN INVITATION</div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>

<button id="musicBtn">🔊</button>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Aman & Rishika</h1>
  <p>request the pleasure of your company</p>
</div>

<!-- FOOTER -->
<footer>
  <p><strong>
  “MERE MAAMU KI SHAADI MEIN JALOOL-JALOOL AANA”<br>
  from VAANI, BAANI & MEHAR
  </strong></p>
</footer>

<script>
const flap=document.getElementById("flap");
const env=document.getElementById("envelope");
const hero=document.getElementById("hero");
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

// OPEN ENVELOPE
function openInvite(){
  flap.style.transform="rotateX(180deg)";
  setTimeout(()=>{
    env.style.display="none";
    hero.style.opacity="1";
    music.play();
  },1000);
}

// MUSIC CONTROL
btn.onclick=()=>{
  if(music.paused){music.play();btn.innerHTML="🔇"}
  else{music.pause();btn.innerHTML="🔊"}
}

// PARTICLES
for(let i=0;i<40;i++){
  let d=document.createElement("div");
  d.className="p";
  d.style.left=Math.random()*100+"%";
  d.style.animationDuration=5+Math.random()*10+"s";
  document.body.appendChild(d);
}

// PETALS
for(let i=0;i<20;i++){
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=5+Math.random()*10+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
